<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Data Path Not Found</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-darker: #050508;
      --accent-red: #ff003c;
      --border-glass: rgba(255, 0, 60, 0.15);
      --neon-glow: 0 0 15px rgba(255, 0, 60, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-darker);
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Sci-fi Background Grid */
    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        linear-gradient(rgba(255, 0, 60, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 60, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg) translateY(-30%);
      opacity: 0.5;
      z-index: 1;
      pointer-events: none;
    }

    .error-container {
      position: relative;
      z-index: 10;
      text-align: center;
      background: rgba(15, 15, 25, 0.7);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), var(--neon-glow);
      animation: floatPanel 4s ease-in-out infinite alternate;
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: 6rem;
      font-weight: 900;
      color: var(--accent-red);
      text-shadow: var(--neon-glow);
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .error-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .error-desc {
      color: #a0a0ba;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 30px;
      background: var(--accent-red);
      color: #fff;
      border: 1px solid var(--accent-red);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: var(--neon-glow);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .btn-home:hover {
      background: #ff3366;
      border-color: #ff3366;
      box-shadow: 0 0 25px rgba(255, 0, 60, 0.7);
      transform: translateY(-3px);
    }

    @keyframes floatPanel {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-code">404</div>
    <h2 class="error-title">Data Path Not Found</h2>
    <p class="error-desc">
      The coordinates you requested do not exist in this database. The file may have been moved, deleted, or is temporarily offline.
    </p>
    <a href="index.html" class="btn-home">
      <i class="fa-solid fa-server"></i> Return to Core System
    </a>
  </div>

</body>
</html>
